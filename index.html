<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Serproen — Dashboard Ventas 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --nav:#1F5C3A;
  --hc:#2E8B57;
  --psp:#5B4AC8;
  --res:#C07C10;
  --par:#0B7A7A;
  --bg:#F4F6F5;
  --card:#FFFFFF;
  --text:#1C2B23;
  --muted:#6B7A72;
  --border:#E4E9E6;
  --pos:#1E8F5C;
  --neg:#C43D3D;
}
*{box-sizing:border-box;}
body{margin:0;background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;}
.mono{font-family:'DM Mono',monospace;}
header.topbar{background:var(--nav);color:#fff;padding:22px 32px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;}
header.topbar h1{font-size:19px;margin:0;font-weight:700;letter-spacing:.2px;}
header.topbar .sub{font-size:12.5px;opacity:.85;font-family:'DM Mono',monospace;}
nav.tabs{display:flex;gap:4px;background:#fff;padding:6px;margin:20px 32px 0 32px;border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,.06);flex-wrap:wrap;}
nav.tabs button{border:none;background:transparent;padding:10px 16px;border-radius:8px;font-family:inherit;font-size:13.5px;font-weight:600;color:var(--muted);cursor:pointer;transition:.15s;white-space:nowrap;}
nav.tabs button:hover{background:#F0F3F1;color:var(--text);}
nav.tabs button.active{background:var(--nav);color:#fff;}
main{max-width:1360px;margin:0 auto;padding:22px 32px 60px 32px;}
.tabpanel{display:none;}
.tabpanel.active{display:block;animation:fade .25s ease;}
@keyframes fade{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:none;}}
.grid{display:grid;gap:16px;}
.kpis{grid-template-columns:repeat(auto-fit,minmax(200px,1fr));margin-bottom:18px;}
.card{background:var(--card);border-radius:14px;padding:18px 20px;box-shadow:0 1px 3px rgba(0,0,0,.06);border:1px solid var(--border);}
.kpi .label{font-size:11.5px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);font-weight:600;}
.kpi .value{font-size:26px;font-weight:800;margin-top:6px;font-family:'DM Mono',monospace;}
.kpi .delta{font-size:12.5px;margin-top:4px;font-weight:600;color:var(--muted);}
.pos{color:var(--pos);}
.neg{color:var(--neg);}
.charts-2{grid-template-columns:1.3fr 1fr;}
.charts-1{grid-template-columns:1fr;}
@media(max-width:900px){.charts-2{grid-template-columns:1fr;}}
.card h3{margin:0 0 14px 0;font-size:14px;font-weight:700;color:var(--text);}
canvas{max-height:340px;}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{text-align:left;padding:9px 10px;border-bottom:2px solid var(--border);color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.4px;font-weight:700;white-space:nowrap;}
td{padding:9px 10px;border-bottom:1px solid #F0F2F1;font-family:'DM Mono',monospace;font-size:12.6px;}
tr:hover td{background:#FAFBFA;}
tr.total-row td{font-weight:700;border-top:2px solid var(--border);border-bottom:none;background:#FAFBFA;}
tr.subtotal-row td{font-weight:700;background:#FAFBFA;}
.right{text-align:right;}
.dot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:7px;vertical-align:middle;}
.linea-cell{white-space:nowrap;font-family:'Plus Jakarta Sans',sans-serif;font-weight:600;}
.month-selector{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:18px;}
.month-chip{background:#fff;border:1px solid var(--border);padding:14px 16px;border-radius:12px;cursor:pointer;transition:.15s;}
.month-chip .mname{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;}
.month-chip .mval{font-size:17px;font-weight:800;font-family:'DM Mono',monospace;margin-top:5px;}
.month-chip .mdelta{font-size:11.5px;margin-top:3px;font-weight:600;}
.month-chip:hover{border-color:var(--nav);}
.month-chip.active{background:var(--nav);border-color:var(--nav);}
.month-chip.active .mname, .month-chip.active .mval{color:#fff;}
.month-chip.active .mdelta{color:#DCEEE4;}
.searchbox{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:10px;font-family:inherit;font-size:13.5px;margin-bottom:14px;}
.tablewrap{overflow-x:auto;}
footer{text-align:center;color:var(--muted);font-size:11.5px;padding:20px;font-family:'DM Mono',monospace;}
</style>
</head>

  });
  const difT = (totalAcum-budgetAcum)/budgetAcum*100;
  tbody.innerHTML += `<tr class="total-row"><td>TOTAL</td><td class="right">${fmtM(totalAcum)}</td><td class="right">${fmtM(budgetAcum)}</td><td class="right ${difT>=0?'pos':'neg'}">${fmtPct(difT)}</td><td class="right">100%</td></tr>`;
}

let mesSeleccionado = 'Junio';
function buildPorMes(){
  const panel = document.getElementById('panel-pormes');
  panel.innerHTML = `
    <div class="month-selector" id="monthSelector"></div>
    <div class="grid charts-2">
      <div class="card"><h3 id="pmTitle"></h3><canvas id="chartPorMes"></canvas></div>
      <div class="card"><h3>Evolución mensual total ($M)</h3><canvas id="chartPorMesEvol"></canvas></div>
    </div>
  `;
  const sel = document.getElementById('monthSelector');
  MESES.forEach(m=>{
    const chip = document.createElement('div');
    chip.className = 'month-chip'+(m===mesSeleccionado?' active':'');
    const delta = totalMes[m]-budgetMes[m];
    chip.innerHTML = `<div class="mname">${m}</div><div class="mval">${fmtM(totalMes[m])}</div><div class="mdelta">vs Bgt ${fmtMSign(delta)}</div>`;
    chip.onclick = ()=>{ mesSeleccionado=m; renderPorMes(); };
    sel.appendChild(chip);
  });
  charts.pormesEvol = new Chart(document.getElementById('chartPorMesEvol'), {
    type:'line',
    data:{ labels:MESES, datasets:[
      {label:'Venta', data:MESES.map(m=>totalMes[m]), borderColor:'#1F5C3A', backgroundColor:'#1F5C3A22', fill:true, tension:.3},
      {label:'Budget', data:MESES.map(m=>budgetMes[m]), borderColor:'#9AA6A0', borderDash:[5,4], fill:false, tension:.2}
    ]},
    options:{ responsive:true, plugins:{legend:{position:'bottom'}}, scales:{y:{ticks:{callback:v=>fmtM(v)}}} }
  });
  renderPorMes();
}
function renderPorMes(){
  document.querySelectorAll('#monthSelector .month-chip').forEach((c,i)=>c.classList.toggle('active', MESES[i]===mesSeleccionado));
  document.getElementById('pmTitle').textContent = mesSeleccionado + ' — Venta vs Budget por línea';
  if(charts.pormes) charts.pormes.destroy();
  charts.pormes = new Chart(document.getElementById('chartPorMes'), {
    type:'bar',
    data:{ labels:AREAS, datasets:[
      {label:'Venta', data:AREAS.map(a=>DATA.monthly_area[mesSeleccionado][a]), backgroundColor:AREAS.map(a=>COLOR[a])},
      {label:'Budget', data:AREAS.map(a=>DATA.monthly_area_budget[mesSeleccionado][a]), backgroundColor:'#C9D3CE'}
    ] },
    options:{ responsive:true, plugins:{legend:{position:'bottom'}}, scales:{y:{ticks:{callback:v=>fmtM(v)}}} }
  });
}

function buildTopClientes(){
  const panel = document.getElementById('panel-topclientes');
  const top8 = clientesTop.slice(0,8);
  const top7 = clientesTop.slice(0,7);
  const top7sum = top7.reduce((s,c)=>s+c[1],0);
  panel.innerHTML = `
    <div class="grid charts-2">
      <div class="card"><h3>Ranking top 8 clientes ($M)</h3><canvas id="chartTop8"></canvas></div>
      <div class="card"><h3>Participación en venta total</h3><canvas id="chartTopDonut"></canvas></div>
    </div>
    <div class="card" style="margin-top:16px;">
      <h3>Detalle top clientes</h3>
      <div class="tablewrap"><table><thead><tr><th>#</th><th>Cliente</th><th>Línea</th><th class="right">Venta acum.</th><th class="right">% del total</th></tr></thead><tbody id="tblTop"></tbody></table></div>
    </div>
  `;
  charts.top8 = new Chart(document.getElementById('chartTop8'), {
    type:'bar',
    data:{ labels: top8.map(c=>c[0]), datasets:[{data: top8.map(c=>c[1]), backgroundColor: top8.map(c=>COLOR[DATA.client_area[c[0]]])}] },
    options:{ indexAxis:'y', responsive:true, plugins:{legend:{display:false}}, scales:{x:{ticks:{callback:v=>fmtM(v)}}} }
  });
  charts.topdonut = new Chart(document.getElementById('chartTopDonut'), {
    type:'doughnut',
    data:{ labels: [...top7.map(c=>c[0]), 'Otros'], datasets:[{data:[...top7.map(c=>c[1]), totalAcum-top7sum], backgroundColor:['#1F5C3A','#2E8B57','#5B4AC8','#C07C10','#0B7A7A','#7A9E8F','#B0A6D8','#D9C9A8']}] },
    options:{ responsive:true, plugins:{legend:{position:'bottom', labels:{boxWidth:10,font:{size:10.5}}}} }
  });
  const tbody = document.getElementById('tblTop');
  let acc = 0;
  clientesTop.forEach((c,i)=>{
    const pct = c[1]/totalAcum*100;
    acc += c[1];
    tbody.innerHTML += `<tr><td>${i+1}</td><td>${c[0]}</td><td class="linea-cell">${dot(DATA.client_area[c[0]])}${DATA.client_area[c[0]]}</td><td class="right">${fmtM(c[1])}</td><td class="right">${pct.toFixed(1)}%</td></tr>`;
    if(i===7){
      const pct8 = acc/totalAcum*100;
      tbody.innerHTML += `<tr class="subtotal-row"><td colspan="3">Top 8 subtotal</td><td class="right">${fmtM(acc)}</td><td class="right">${pct8.toFixed(1)}%</td></tr>`;
    }
  });
  tbody.innerHTML += `<tr class="total-row"><td colspan="3">TOTAL</td><td class="right">${fmtM(totalAcum)}</td><td class="right">100%</td></tr>`;
}

function buildAreaTab(id, areaName){
  const panel = document.getElementById('panel-'+id);
  const acum = areaAcum[areaName], bud = areaBudgetAcum[areaName];
  const dif = (acum-bud)/bud*100;
  const bestMonth = MESES.reduce((best,m)=> DATA.monthly_area[m][areaName]>DATA.monthly_area[best][areaName]?m:best, MESES[0]);
  const bestVal = DATA.monthly_area[bestMonth][areaName];
  const bestBud = DATA.monthly_area_budget[bestMonth][areaName];
  const bestPct = (bestVal-bestBud)/bestBud*100;
  const part = acum/totalAcum*100;
  const esLider = areaName===lineaLider;
  panel.innerHTML = `
    <div class="grid kpis">
      <div class="card kpi"><div class="label">Venta acumulada</div><div class="value">${fmtM(acum)}</div><div class="delta ${dif>=0?'pos':'neg'}">vs Budget ${fmtPct(dif)}</div></div>
      <div class="card kpi"><div class="label">Budget acumulado</div><div class="value">${fmtM(bud)}</div><div class="delta">Ene–Jun</div></div>
      <div class="card kpi"><div class="label">Mejor mes</div><div class="value">${fmtM(bestVal)}</div><div class="delta">${bestMonth} · ${fmtPct(bestPct)} Bgt</div></div>
      <div class="card kpi"><div class="label">Participación</div><div class="value">${part.toFixed(1)}%</div><div class="delta">${esLider?'Línea líder':'del total'}</div></div>
    </div>
    <div class="grid charts-2">
      <div class="card"><h3>${areaName} — Venta vs Budget mensual ($M)</h3><canvas id="chart_${id}_evol"></canvas></div>
      <div class="card"><h3>${areaName} — Desviación vs Budget ($M)</h3><canvas id="chart_${id}_dev"></canvas></div>
    </div>
    <div class="card" style="margin-top:16px;">
      <h3>${areaName} — Detalle mensual</h3>
      <div class="tablewrap"><table><thead><tr><th>Mes</th><th class="right">Venta</th><th class="right">Budget</th><th class="right">Diferencia</th><th class="right">vs Budget</th></tr></thead><tbody id="tbl_${id}_detalle"></tbody></table></div>
    </div>
    <div class="card" style="margin-top:16px;">
      <h3>${areaName} — Clientes · Venta mensual ($M)</h3>
      <div class="tablewrap"><table><thead><tr><th>#</th><th>Cliente</th>${MESES.map(m=>`<th class="right">${m.slice(0,3)}</th>`).join('')}<th class="right">Total</th></tr></thead><tbody id="tbl_${id}_clientes"></tbody></table></div>
    </div>
  `;
  charts[id+'evol'] = new Chart(document.getElementById(`chart_${id}_evol`), {
    type:'line',
    data:{ labels:MESES, datasets:[
      {label:'Venta', data:MESES.map(m=>DATA.monthly_area[m][areaName]), borderColor:COLOR[areaName], backgroundColor:COLOR[areaName]+'22', fill:true, tension:.3},
      {label:'Budget', data:MESES.map(m=>DATA.monthly_area_budget[m][areaName]), borderColor:'#9AA6A0', borderDash:[5,4], fill:false, tension:.2}
    ]},
    options:{ responsive:true, plugins:{legend:{position:'bottom'}}, scales:{y:{ticks:{callback:v=>fmtM(v)}}} }
  });
  charts[id+'dev'] = new Chart(document.getElementById(`chart_${id}_dev`), {
    type:'bar',
    data:{ labels:MESES, datasets:[{label:'Diferencia', data:MESES.map(m=>DATA.monthly_area[m][areaName]-DATA.monthly_area_budget[m][areaName]), backgroundColor: MESES.map(m=>(DATA.monthly_area[m][areaName]-DATA.monthly_area_budget[m][areaName])>=0?'#1E8F5C':'#C43D3D') }] },
    options:{ responsive:true, plugins:{legend:{display:false}}, scales:{y:{ticks:{callback:v=>fmtM(v)}}} }
  });
  const tdet = document.getElementById(`tbl_${id}_detalle`);
  MESES.forEach(m=>{
    const v = DATA.monthly_area[m][areaName], b = DATA.monthly_area_budget[m][areaName];
    const d = v-b, pct = d/b*100;
    tdet.innerHTML += `<tr><td>${m}</td><td class="right">${fmtM(v)}</td><td class="right">${fmtM(b)}</td><td class="right ${d>=0?'pos':'neg'}">${fmtMSign(d)}</td><td class="right ${pct>=0?'pos':'neg'}">${fmtPct(pct)}</td></tr>`;
  });
  const dT = acum-bud, pctT = dT/bud*100;
  tdet.innerHTML += `<tr class="total-row"><td>Total</td><td class="right">${fmtM(acum)}</td><td class="right">${fmtM(bud)}</td><td class="right ${dT>=0?'pos':'neg'}">${fmtMSign(dT)}</td><td class="right ${pctT>=0?'pos':'neg'}">${fmtPct(pctT)}</td></tr>`;

  const tcli = document.getElementById(`tbl_${id}_clientes`);
  const clientesArea = Object.entries(DATA.client_total).filter(([c])=>DATA.client_area[c]===areaName).sort((a,b)=>b[1]-a[1]);
  clientesArea.forEach(([c,total],i)=>{
    const cells = MESES.map(m=>`<td class="right">${fmtM(DATA.client_month[c][m])}</td>`).join('');
    tcli.innerHTML += `<tr><td>${i+1}</td><td>${c}</td>${cells}<td class="right" style="font-weight:700;">${fmtM(total)}</td></tr>`;
  });
}

    </div>
  `;
  charts.clientesTop15 = new Chart(document.getElementById('chartClientesTop15'), {
    type:'bar',
    data:{ labels: top15.map(c=>c[0]), datasets:[{data: top15.map(c=>c[1]), backgroundColor: top15.map(c=>COLOR[DATA.client_area[c[0]]])}] },
    options:{ indexAxis:'y', responsive:true, plugins:{legend:{display:false}}, scales:{x:{ticks:{callback:v=>fmtM(v)}}} }
  });
  function renderTabla(filter){
    const tbody = document.querySelector('#tablaClientes tbody');
    tbody.innerHTML = '';
    clientesTop.filter(c=>c[0].toLowerCase().includes(filter.toLowerCase())).forEach(([c,total],i)=>{
      const cells = MESES.map(m=>`<td class="right">${(DATA.client_month[c][m]/1e6).toLocaleString('es-CL',{minimumFractionDigits:1,maximumFractionDigits:1})}</td>`).join('');
      tbody.innerHTML += `<tr><td>${i+1}</td><td>${c}</td><td class="linea-cell">${dot(DATA.client_area[c])}${DATA.client_area[c]}</td>${cells}<td class="right" style="font-weight:700;">${fmtM(total)}</td></tr>`;
    });
  }
  renderTabla('');
  document.getElementById('buscadorClientes').addEventListener('input', e=>renderTabla(e.target.value));
}

buildTab('resumen'); built['resumen']=true;
