<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Ventas 2026 · Serproen</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --nav:#1F5C3A;
  --hc:#2E8B57;
  --psp:#5B4AC8;
  --res:#C07C10;
  --par:#0B7A7A;
  --bg:#F4F6F5;
  --card:#FFFFFF;
  --text:#1C2B23;
  --muted:#6B7A72;
  --border:#E4E9E6;
  --pos:#1E8F5C;
  --neg:#C43D3D;
}
*{box-sizing:border-box;}
body{margin:0;background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;}
.mono{font-family:'DM Mono',monospace;}
header.topbar{background:var(--nav);color:#fff;padding:22px 32px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;}
header.topbar h1{font-size:19px;margin:0;font-weight:700;letter-spacing:.2px;}
header.topbar .sub{font-size:12.5px;opacity:.85;font-family:'DM Mono',monospace;}
nav.tabs{display:flex;gap:4px;background:#fff;padding:6px;margin:20px 32px 0 32px;border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,.06);flex-wrap:wrap;}
nav.tabs button{border:none;background:transparent;padding:10px 16px;border-radius:8px;font-family:inherit;font-size:13.5px;font-weight:600;color:var(--muted);cursor:pointer;transition:.15s;white-space:nowrap;}
nav.tabs button:hover{background:#F0F3F1;color:var(--text);}
nav.tabs button.active{background:var(--nav);color:#fff;}
main{max-width:1360px;margin:0 auto;padding:22px 32px 60px 32px;}
.tabpanel{display:none;}
.tabpanel.active{display:block;animation:fade .25s ease;}
@keyframes fade{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:none;}}
.grid{display:grid;gap:16px;}
.kpis{grid-template-columns:repeat(auto-fit,minmax(200px,1fr));margin-bottom:18px;}
.card{background:var(--card);border-radius:14px;padding:18px 20px;box-shadow:0 1px 3px rgba(0,0,0,.06);border:1px solid var(--border);}
.kpi .label{font-size:11.5px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);font-weight:600;}
.kpi .value{font-size:26px;font-weight:800;margin-top:6px;font-family:'DM Mono',monospace;}
.kpi .delta{font-size:12.5px;margin-top:4px;font-weight:600;}
.pos{color:var(--pos);}
.neg{color:var(--neg);}
.charts-2{grid-template-columns:1.3fr 1fr;}
.charts-1{grid-template-columns:1fr;}
@media(max-width:900px){.charts-2{grid-template-columns:1fr;}}
.card h3{margin:0 0 14px 0;font-size:14px;font-weight:700;color:var(--text);}
canvas{max-height:340px;}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{text-align:left;padding:9px 10px;border-bottom:2px solid var(--border);color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.4px;font-weight:700;white-space:nowrap;}
td{padding:9px 10px;border-bottom:1px solid #F0F2F1;font-family:'DM Mono',monospace;font-size:12.6px;}
tr:hover td{background:#FAFBFA;}
.right{text-align:right;}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700;color:#fff;}
.month-selector{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px;}
.month-chip{background:#fff;border:1px solid var(--border);padding:10px 18px;border-radius:10px;cursor:pointer;font-weight:600;font-size:13px;color:var(--muted);transition:.15s;}
.month-chip:hover{border-color:var(--nav);color:var(--nav);}
.month-chip.active{background:var(--nav);color:#fff;border-color:var(--nav);}
.searchbox{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:10px;font-family:inherit;font-size:13.5px;margin-bottom:14px;}
.note{font-size:12px;color:var(--muted);margin-top:10px;line-height:1.5;}
.tag-hc{background:var(--hc);} .tag-psp{background:var(--psp);} .tag-res{background:var(--res);} .tag-par{background:var(--par);}
.tablewrap{overflow-x:auto;}
footer{text-align:center;color:var(--muted);font-size:11.5px;padding:20px;font-family:'DM Mono',monospace;}
</style>
</head>

}

function buildTab(id){

/* ============ TAB: RESUMEN ============ */
function buildResumen(){
  const panel = document.getElementById('panel-resumen');
  const yoyPct = (totalAcum - YOY_2025_ENE_JUN)/YOY_2025_ENE_JUN*100;
  const vsBudget = (totalAcum-budgetAcum)/budgetAcum*100;
  panel.innerHTML = `

      <div class="card"><h3>Participación acumulada por línea</h3><canvas id="chartResumenDonut"></canvas></div>
    </div>
    <div class="grid charts-1" style="margin-top:16px;">
      <div class="card"><h3>Venta vs Budget mensual (total Serproen)</h3><canvas id="chartResumenBudget"></canvas></div>

    <div class="note">Nota: la línea "Facturado" del archivo fuente se excluye permanentemente de todas las vistas; la venta mostrada corresponde a Facturado + Provisión + Reverso de cada mes. Junio incluye clientes institucionales con provisión aún pendiente de cierre (p.ej. H. Sótero del Río, U. de las Américas), por lo que la cifra podría ajustarse al consolidar el mes.</div>
  `;
  charts.stack = new Chart(document.getElementById('chartResumenStack'), {
    type:'bar',
    data:{ labels:MESES, datasets: AREAS.map(a=>({label:a, data:MESES.map(m=>DATA.monthly_area[m][a]), backgroundColor:COLOR[a]})) },
    options:{ responsive:true, plugins:{legend:{position:'bottom'}}, scales:{ x:{stacked:true}, y:{stacked:true, ticks:{callback:v=>fmtM(v)}} } }

    options:{ responsive:true, plugins:{legend:{position:'bottom'}} }

  charts.budget = new Chart(document.getElementById('chartResumenBudget'), {
    type:'bar',
    data:{ labels:MESES, datasets:[
      {label:'Venta', data:MESES.map(m=>totalMes[m]), backgroundColor:'#1F5C3A'},
      {label:'Budget', data:MESES.map(m=>budgetMes[m]), backgroundColor:'#C9D3CE'}
    ]},
    options:{ responsive:true, plugins:{legend:{position:'bottom'}}, scales:{y:{ticks:{callback:v=>fmtM(v)}}} }
  });
}

/* ============ TAB: POR MES ============ */
let mesSeleccionado = 'Junio';
function buildPorMes(){
  const panel = document.getElementById('panel-pormes');

  renderPorMes(true);
}

  });

    const v = DATA.monthly_area[mesSeleccionado][a];
    const b = DATA.monthly_area_budget[mesSeleccionado][a];
    totV+=v; totB+=b;
    const dif = (v-b)/b*100;
    tbody.innerHTML += `<tr><td><span class="badge ${TAGCLASS[a]}">${a}</span></td><td class="right">${fmtM(v)}</td><td class="right">${fmtM(b)}</td><td class="right ${dif>=0?'pos':'neg'}">${fmtPct(dif)}</td></tr>`;
  });
  const difT = (totV-totB)/totB*100;
  tbody.innerHTML += `<tr style="font-weight:700;"><td>TOTAL</td><td class="right">${fmtM(totV)}</td><td class="right">${fmtM(totB)}</td><td class="right ${difT>=0?'pos':'neg'}">${fmtPct(difT)}</td></tr>`;
}

/* ============ TAB: TOP CLIENTES ============ */
function buildTopClientes(){
  const panel = document.getElementById('panel-topclientes');
  const top8 = clientesTop.slice(0,8);
  panel.innerHTML = `
    <div class="grid charts-2">
      <div class="card"><h3>Top 8 clientes — acumulado Ene–Jun 2026</h3><canvas id="chartTop8"></canvas></div>
      <div class="card"><h3>Participación Top 8 vs resto</h3><canvas id="chartTopDonut"></canvas></div>
    </div>
    <div class="card" style="margin-top:16px;">
      <h3>Ranking completo</h3>
      <div class="tablewrap"><table id="tablaTop"><thead><tr><th>#</th><th>Cliente</th><th>Línea</th><th class="right">Venta acum.</th><th class="right">% del total</th></tr></thead><tbody></tbody></table></div>
    </div>
  `;
  charts.top8 = new Chart(document.getElementById('chartTop8'), {
    type:'bar',
    data:{ labels: top8.map(c=>c[0]), datasets:[{data: top8.map(c=>c[1]), backgroundColor: top8.map(c=>COLOR[DATA.client_area[c[0]]])}] },
    options:{ indexAxis:'y', responsive:true, plugins:{legend:{display:false}}, scales:{x:{ticks:{callback:v=>fmtM(v)}}} }
  });
  const top8sum = top8.reduce((s,c)=>s+c[1],0);
  charts.topdonut = new Chart(document.getElementById('chartTopDonut'), {
    type:'doughnut',
    data:{ labels:['Top 8','Resto de clientes'], datasets:[{data:[top8sum, totalAcum-top8sum], backgroundColor:['#1F5C3A','#C9D3CE']}] },
    options:{ responsive:true, plugins:{legend:{position:'bottom'}} }
  });
  const tbody = document.querySelector('#tablaTop tbody');
  clientesTop.forEach((c,i)=>{
    const pct = c[1]/totalAcum*100;
    tbody.innerHTML += `<tr><td>${i+1}</td><td>${c[0]}</td><td><span class="badge ${TAGCLASS[DATA.client_area[c[0]]]}">${DATA.client_area[c[0]]}</span></td><td class="right">${fmtM(c[1])}</td><td class="right">${pct.toFixed(1)}%</td></tr>`;
  });
}

/* ============ TABS: HC B2B / PSP / RESIDENCIA ============ */
function buildAreaTab(id, areaName){
  const panel = document.getElementById('panel-'+id);
  const acum = areaAcum[areaName], bud = areaBudgetAcum[areaName];
  const dif = (acum-bud)/bud*100;
  panel.innerHTML = `
    <div class="grid kpis">
      <div class="card kpi"><div class="label">Venta acumulada</div><div class="value">${fmtM(acum)}</div></div>
      <div class="card kpi"><div class="label">Budget acumulado</div><div class="value">${fmtM(bud)}</div></div>
      <div class="card kpi"><div class="label">Desviación vs Budget</div><div class="value ${dif>=0?'pos':'neg'}">${fmtPct(dif)}</div></div>
    </div>
    <div class="grid charts-2">
      <div class="card"><h3>Evolución mensual — ${areaName}</h3><canvas id="chart_${id}_evol"></canvas></div>
      <div class="card"><h3>Desviación vs Budget por mes</h3><canvas id="chart_${id}_dev"></canvas></div>
    </div>
    <div class="card" style="margin-top:16px;">
      <h3>Clientes de ${areaName} — acumulado Ene–Jun</h3>
      <div class="tablewrap"><table><thead><tr><th>Cliente</th><th class="right">Venta acum.</th></tr></thead><tbody id="tbody_${id}"></tbody></table></div>
    </div>
  `;
  charts[id+'evol'] = new Chart(document.getElementById(`chart_${id}_evol`), {
    type:'line',
    data:{ labels:MESES, datasets:[
      {label:'Venta', data:MESES.map(m=>DATA.monthly_area[m][areaName]), borderColor:COLOR[areaName], backgroundColor:COLOR[areaName]+'22', fill:true, tension:.3},
      {label:'Budget', data:MESES.map(m=>DATA.monthly_area_budget[m][areaName]), borderColor:'#9AA6A0', borderDash:[5,4], fill:false, tension:.2}
    ]},
    options:{ responsive:true, plugins:{legend:{position:'bottom'}}, scales:{y:{ticks:{callback:v=>fmtM(v)}}} }
  });
  charts[id+'dev'] = new Chart(document.getElementById(`chart_${id}_dev`), {
    type:'bar',
    data:{ labels:MESES, datasets:[{label:'Dif. vs Budget %', data:MESES.map(m=>{ const v=DATA.monthly_area[m][areaName], b=DATA.monthly_area_budget[m][areaName]; return ((v-b)/b*100); }), backgroundColor: MESES.map(m=>{ const v=DATA.monthly_area[m][areaName], b=DATA.monthly_area_budget[m][areaName]; return (v-b)>=0?'#1E8F5C':'#C43D3D'; }) }] },
    options:{ responsive:true, plugins:{legend:{display:false}}, scales:{y:{ticks:{callback:v=>v.toFixed(0)+'%'}}} }
  });
  const tbody = document.getElementById('tbody_'+id);
  Object.entries(DATA.client_total).filter(([c])=>DATA.client_area[c]===areaName).sort((a,b)=>b[1]-a[1]).forEach(([c,v])=>{
    tbody.innerHTML += `<tr><td>${c}</td><td class="right">${fmtM(v)}</td></tr>`;
  });
}

/* ============ TAB: CLIENTES ============ */
function buildClientes(){
  const panel = document.getElementById('panel-clientes');
  const top15 = clientesTop.slice(0,15);
  panel.innerHTML = `
    <div class="grid charts-1" style="margin-bottom:16px;">
      <div class="card"><h3>Top 15 clientes — acumulado Ene–Jun 2026</h3><canvas id="chartClientesTop15"></canvas></div>
    </div>
    <div class="card">
      <h3>Todos los clientes (${clientesTop.length})</h3>
      <input class="searchbox" id="buscadorClientes" placeholder="Buscar cliente...">
      <div class="tablewrap"><table id="tablaClientes"><thead><tr><th>Cliente</th><th>Línea</th>${MESES.map(m=>`<th class="right">${m.slice(0,3)}</th>`).join('')}<th class="right">Total</th></tr></thead><tbody></tbody></table></div>
    </div>
  `;
  charts.clientesTop15 = new Chart(document.getElementById('chartClientesTop15'), {
    type:'bar',
    data:{ labels: top15.map(c=>c[0]), datasets:[{data: top15.map(c=>c[1]), backgroundColor: top15.map(c=>COLOR[DATA.client_area[c[0]]])}] },
    options:{ indexAxis:'y', responsive:true, plugins:{legend:{display:false}}, scales:{x:{ticks:{callback:v=>fmtM(v)}}} }
  });
  function renderTabla(filter){
    const tbody = document.querySelector('#tablaClientes tbody');
    tbody.innerHTML = '';
    clientesTop.filter(c=>c[0].toLowerCase().includes(filter.toLowerCase())).forEach(([c,total])=>{
      const cells = MESES.map(m=>`<td class="right">${(DATA.client_month[c][m]/1e6).toLocaleString('es-CL',{minimumFractionDigits:1,maximumFractionDigits:1})}</td>`).join('');
      tbody.innerHTML += `<tr><td>${c}</td><td><span class="badge ${TAGCLASS[DATA.client_area[c]]}">${DATA.client_area[c]}</span></td>${cells}<td class="right" style="font-weight:700;">${fmtM(total)}</td></tr>`;
    });
  }
  renderTabla('');
  document.getElementById('buscadorClientes').addEventListener('input', e=>renderTabla(e.target.value));
}

/* Init */
buildTab('resumen'); built['resumen']=true;
</script>
